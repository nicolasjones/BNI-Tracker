<!DOCTYPE html>

<html lang="es"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Nueva Interacción - BNI Track</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@600;700&amp;family=Source+Sans+3:wght@400;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .icon-fill {
            font-variation-settings: 'FILL' 1;
        }
    </style>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "outline": "#906f6e",
                        "surface-container-high": "#e8e8e8",
                        "on-secondary-fixed-variant": "#3e4853",
                        "success": "#15803D",
                        "primary-container": "#c8102e",
                        "on-secondary-fixed": "#121d26",
                        "inverse-primary": "#ffb3b1",
                        "primary": "#9e001f",
                        "text-primary": "#1F2933",
                        "surface-container-low": "#f3f3f3",
                        "surface-dim": "#dadada",
                        "primary-fixed-dim": "#ffb3b1",
                        "surface-container-lowest": "#ffffff",
                        "secondary-container": "#d9e3f1",
                        "on-secondary-container": "#5b6571",
                        "surface-variant": "#e2e2e2",
                        "tertiary-container": "#885c0b",
                        "surface-container-highest": "#e2e2e2",
                        "danger": "#B91C1C",
                        "tertiary-fixed-dim": "#f7bc67",
                        "secondary-fixed-dim": "#bdc7d5",
                        "surface-bright": "#f9f9f9",
                        "on-tertiary": "#ffffff",
                        "surface": "#f9f9f9",
                        "inverse-surface": "#2f3131",
                        "inverse-on-surface": "#f1f1f1",
                        "secondary": "#555f6b",
                        "on-surface": "#1a1c1c",
                        "on-background": "#1a1c1c",
                        "on-primary": "#ffffff",
                        "background": "#f9f9f9",
                        "error-container": "#ffdad6",
                        "surface-tint": "#bf0229",
                        "tertiary": "#6a4500",
                        "on-error": "#ffffff",
                        "border-subtle": "#E5E7EB",
                        "on-primary-container": "#ffdad8",
                        "secondary-fixed": "#d9e3f1",
                        "on-primary-fixed-variant": "#92001c",
                        "on-tertiary-container": "#ffddb3",
                        "warning": "#B45309",
                        "on-tertiary-fixed-variant": "#624000",
                        "tertiary-fixed": "#ffddb2",
                        "on-error-container": "#93000a",
                        "surface-container": "#eeeeee",
                        "error": "#ba1a1a",
                        "on-primary-fixed": "#410007",
                        "on-secondary": "#ffffff",
                        "text-secondary": "#6B7280",
                        "on-surface-variant": "#5c403f",
                        "primary-fixed": "#ffdad8",
                        "outline-variant": "#e5bdbb",
                        "on-tertiary-fixed": "#291800"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    "spacing": {
                        "gutter": "16px",
                        "container-margin": "24px",
                        "unit": "4px",
                        "compact-padding": "8px",
                        "standard-padding": "16px"
                    },
                    "fontFamily": {
                        "headline-lg": ["Montserrat"],
                        "label-md": ["\"Source Sans 3\""],
                        "body-md": ["\"Source Sans 3\""],
                        "headline-xl": ["Montserrat"],
                        "label-sm": ["\"Source Sans 3\""],
                        "headline-md": ["Montserrat"],
                        "body-sm": ["\"Source Sans 3\""],
                        "body-lg": ["\"Source Sans 3\""]
                    },
                    "fontSize": {
                        "headline-lg": ["24px", { "lineHeight": "32px", "fontWeight": "700" }],
                        "label-md": ["12px", { "lineHeight": "16px", "letterSpacing": "0.05em", "fontWeight": "600" }],
                        "body-md": ["14px", { "lineHeight": "20px", "fontWeight": "400" }],
                        "headline-xl": ["32px", { "lineHeight": "40px", "letterSpacing": "-0.02em", "fontWeight": "700" }],
                        "label-sm": ["11px", { "lineHeight": "14px", "fontWeight": "700" }],
                        "headline-md": ["20px", { "lineHeight": "28px", "fontWeight": "600" }],
                        "body-sm": ["13px", { "lineHeight": "18px", "fontWeight": "400" }],
                        "body-lg": ["16px", { "lineHeight": "24px", "fontWeight": "400" }]
                    }
                },
            },
        }
    </script>
</head>
<body class="bg-background text-text-primary min-h-screen flex flex-col">
<!-- Focused Task Header -->
<header class="bg-surface-container-lowest border-b border-border-subtle h-14 flex items-center px-container-margin sticky top-0 z-10 shrink-0">
<button aria-label="Volver" class="flex items-center justify-center w-8 h-8 rounded-full hover:bg-surface-container transition-colors text-secondary mr-4">
<span class="material-symbols-outlined text-[20px]">arrow_back</span>
</button>
<h1 class="font-headline-md text-headline-md text-text-primary">Nueva Interacción</h1>
</header>
<!-- Main Canvas -->
<main class="flex-1 w-full max-w-4xl mx-auto p-container-margin grid grid-cols-1 gap-6">
<!-- Form Container -->
<div class="bg-surface-container-lowest border border-border-subtle rounded-lg overflow-hidden flex flex-col shadow-[0_4px_10px_rgba(0,0,0,0.02)]">
<div class="p-standard-padding border-b border-border-subtle bg-surface-bright">
<h2 class="font-headline-md text-[16px] font-semibold text-text-primary">Detalles del Registro</h2>
</div>
<div class="p-standard-padding flex flex-col gap-6">
<!-- Row 1: Core Details -->
<div class="grid grid-cols-1 md:grid-cols-12 gap-4">
<!-- Contact Selector -->
<div class="col-span-1 md:col-span-5 flex flex-col gap-1">
<label class="font-label-md text-label-md text-secondary" for="contacto">Contacto Relacionado</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-2.5 top-2 text-secondary text-[18px]">person</span>
<select class="w-full h-9 pl-9 pr-8 py-0 font-body-md text-body-md border border-border-subtle rounded-lg focus:outline-none focus:border-primary-container focus:ring-1 focus:ring-primary-container appearance-none bg-surface-container-lowest" id="contacto">
<option selected="" value="carlos_rodriguez">Carlos Rodríguez</option>
<option value="maria_gomez">María Gómez</option>
</select>
<span class="material-symbols-outlined absolute right-2.5 top-2 text-secondary text-[18px] pointer-events-none">expand_more</span>
</div>
</div>
<!-- Interaction Type -->
<div class="col-span-1 md:col-span-3 flex flex-col gap-1">
<label class="font-label-md text-label-md text-secondary" for="tipo">Tipo de Interacción</label>
<select class="w-full h-9 px-compact-padding py-0 font-body-md text-body-md border border-border-subtle rounded-lg focus:outline-none focus:border-primary-container focus:ring-1 focus:ring-primary-container bg-surface-container-lowest" id="tipo">
<option value="1a1">1-a-1</option>
<option value="referido">Referido dado</option>
<option value="llamada">Llamada</option>
<option value="mensaje">Mensaje</option>
<option value="audio">Audio</option>
</select>
</div>
<!-- Date & Duration -->
<div class="col-span-1 md:col-span-2 flex flex-col gap-1">
<label class="font-label-md text-label-md text-secondary" for="fecha">Fecha</label>
<input class="w-full h-9 px-compact-padding py-0 font-body-md text-body-md border border-border-subtle rounded-lg focus:outline-none focus:border-primary-container focus:ring-1 focus:ring-primary-container bg-surface-container-lowest text-text-primary" id="fecha" type="date" value="2023-10-27"/>
</div>
<div class="col-span-1 md:col-span-2 flex flex-col gap-1">
<label class="font-label-md text-label-md text-secondary" for="duracion">Duración</label>
<div class="relative">
<input class="w-full h-9 pl-compact-padding pr-8 py-0 font-body-md text-body-md border border-border-subtle rounded-lg focus:outline-none focus:border-primary-container focus:ring-1 focus:ring-primary-container bg-surface-container-lowest" id="duracion" placeholder="45" type="text"/>
<span class="absolute right-2.5 top-2 font-body-sm text-secondary pointer-events-none">min</span>
</div>
</div>
</div>
<hr class="border-border-subtle"/>
<!-- Row 2: Audio & Transcription Section (Bento-ish layout for this part) -->
<div class="grid grid-cols-1 lg:grid-cols-2 gap-6">
<!-- Left: Audio Input -->
<div class="flex flex-col gap-4">
<div class="flex items-center justify-between">
<label class="font-label-md text-label-md text-text-primary">Evidencia de Audio</label>
<button class="flex items-center gap-1.5 px-3 h-8 bg-surface-bright border border-border-subtle text-primary-container hover:bg-surface-container rounded-md transition-colors" type="button">
<span class="material-symbols-outlined text-[16px] icon-fill">mic</span>
<span class="font-label-md text-label-md">Grabar nota de voz</span>
</button>
</div>
<!-- Dropzone -->
<div class="border-2 border-dashed border-border-subtle bg-surface-bright rounded-lg h-32 flex flex-col items-center justify-center text-center px-4 hover:bg-surface-container transition-colors cursor-pointer group">
<div class="w-10 h-10 rounded-full bg-surface-container-high flex items-center justify-center text-secondary group-hover:text-primary-container transition-colors mb-2">
<span class="material-symbols-outlined">cloud_upload</span>
</div>
<p class="font-body-md text-body-md text-text-primary mb-1">Arrastra un archivo o haz clic para subir</p>
<p class="font-body-sm text-body-sm text-secondary">Formatos soportados: .mp3, .wav (Max 15MB)</p>
</div>
</div>
<!-- Right: Transcription Preview -->
<div class="flex flex-col gap-1">
<label class="font-label-md text-label-md text-text-primary">Transcripción</label>
<div class="flex-1 bg-surface-bright border border-border-subtle rounded-lg p-3 min-h-[160px] relative">
<p class="font-body-md text-body-md text-secondary italic text-center absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-4/5">
                                Suba un audio para iniciar la transcripción automática o pegue el texto manualmente
                            </p>
<!-- Hidden textarea that would be used in a real app -->
<textarea class="w-full h-full bg-transparent resize-none border-none focus:ring-0 text-text-primary p-0 hidden"></textarea>
</div>
</div>
</div>
<hr class="border-border-subtle"/>
<!-- Row 3: Notes & Tasks -->
<div class="grid grid-cols-1 lg:grid-cols-2 gap-6">
<div class="flex flex-col gap-1">
<label class="font-label-md text-label-md text-text-primary" for="notas">Resumen / Notas</label>
<textarea class="w-full h-24 p-compact-padding font-body-md text-body-md border border-border-subtle rounded-lg focus:outline-none focus:border-primary-container focus:ring-1 focus:ring-primary-container bg-surface-container-lowest resize-none" id="notas" placeholder="Detalles principales de la conversación..."></textarea>
</div>
<div class="flex flex-col gap-1">
<label class="font-label-md text-label-md text-text-primary" for="tareas">Próximos pasos / Tareas derivadas</label>
<div class="flex-1 border border-border-subtle rounded-lg bg-surface-container-lowest overflow-hidden flex flex-col focus-within:border-primary-container focus-within:ring-1 focus-within:ring-primary-container">
<textarea class="w-full flex-1 p-compact-padding font-body-md text-body-md border-none focus:ring-0 resize-none bg-transparent" id="tareas" placeholder="Ej. Enviar propuesta, agendar seguimiento..."></textarea>
<div class="bg-surface-bright border-t border-border-subtle p-2 flex justify-between items-center">
<span class="font-label-sm text-secondary">Asignar vencimiento:</span>
<input class="h-7 px-2 py-0 text-label-md border border-border-subtle rounded focus:outline-none focus:border-primary-container text-secondary bg-surface-container-lowest" type="date"/>
</div>
</div>
</div>
</div>
</div>
<!-- Footer Actions -->
<div class="p-standard-padding bg-surface-bright border-t border-border-subtle flex justify-end gap-3 mt-auto">
<button class="h-9 px-4 font-label-md text-label-md text-text-primary bg-surface-container-lowest border border-border-subtle rounded-lg hover:bg-surface-container transition-colors" type="button">
                    Cancelar
                </button>
<button class="h-9 px-6 font-label-md text-label-md text-on-primary bg-primary-container rounded-lg hover:bg-primary transition-colors shadow-sm flex items-center gap-2" type="button">
<span class="material-symbols-outlined text-[18px]">save</span>
                    Guardar Interacción
                </button>
</div>
</div>
</main>
</body></html>
