services:
  ai:
    build:
      context: ../..
      dockerfile: infra/docker/ai.Dockerfile
    env_file:
      - ../../.env
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
