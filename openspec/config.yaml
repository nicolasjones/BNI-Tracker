schema: spec-driven
version: 1
project: bni-tracker
initialized: 2026-07-01
artifact_store: hybrid

context: |
  Project metadata is not fully documented yet; CLAUDE.md still contains onboarding placeholders.
  Current repository contains static HTML MVP prototypes for BNI Track and matching PNG screenshots.
  UI language in current artifacts is Spanish.
  Frontend prototypes use standalone HTML with Tailwind CSS via CDN, Google Fonts, and Material Symbols.
  Technical foundation scaffold now includes Next.js web app, FastAPI AI service, shared config package, Docker assets, CI workflow, and baseline TS/Python tests.

strict_tdd: false

testing:
  detected: 2026-07-01
  strict_tdd: false
  runner:
    available: true
    framework: npm node:test + pytest
    command: "npm run test"
  layers:
    unit:
      available: true
      tool: node:test and pytest
    integration:
      available: false
      tool: null
    e2e:
      available: false
      tool: null
  coverage:
    available: false
    command: ""
  quality:
    linter:
      available: true
      command: "npm run lint"
    type_checker:
      available: true
      command: "npm run typecheck"
    formatter:
      available: true
      command: "npm run format:check"

rules:
  proposal:
    - Include the product question that remains unresolved when project metadata is missing.
    - Include rollback plan for risky changes.
  specs:
    - Use Given/When/Then for scenarios.
    - Use RFC 2119 keywords (MUST, SHALL, SHOULD, MAY).
  design:
    - Document architecture decisions with rationale.
    - Do not assume a runtime stack until implementation files or user direction establish one.
  tasks:
    - Group by phase and keep tasks completable in one focused session.
    - Add test-harness setup tasks before implementation tasks when automated testing is still unavailable.
  apply:
    rules:
      - Follow existing artifact conventions and preserve Spanish UI copy unless a feature specifies otherwise.
    tdd: false
    test_command: "npm run test"
  verify:
    test_command: "npm run test"
    build_command: "npm run build:web"
    coverage_threshold: 0
  archive:
    - Warn before merging destructive deltas.
